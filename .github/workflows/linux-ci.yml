name: linux-ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            pkg-config \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libasound2-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Smoke run scripts
        run: |
          ./build/bin/engine --max-frames 2 rect.lua
          ./build/bin/engine --max-frames 2 pong.lua
          ./build/bin/engine --max-frames 2 dvd.lua
          ./build/bin/engine --max-frames 2 gamepad.lua
          ./build/bin/engine --max-frames 2 doom.lua
